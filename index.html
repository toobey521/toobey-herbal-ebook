</style>

    h+='<div class="tab '+C[n.replace('性','')]+' '+a+'" onclick="sw(\''+n+'\')">'+M[n]+'<span>'+n+'</span><span class="count">'+cnt(n.replace('性',''))+'</span></div>';
  }
  document.getElementById('tabs').innerHTML=h;
}
function sw(n){cat=n.replace('性','');q='';document.getElementById('q').value='';render()}
function search(v){q=v.trim();cat='全部';render()}
function show(i){
  var v=D[i],c=C[v.nature],p=P[v.nature];
  var imgEl=document.getElementById('dImg');
  if(v._img){imgEl.src=IMG_PREFIX+v._img;imgEl.style.display='block'}else{imgEl.style.display='none'}
  var h='<div class="detail-top"><div class="detail-name">'+esc(v.name)+'</div><div class="detail-nature" style="background:'+p+'">'+v.nature+'性</div><div class="detail-taste">味'+v.taste+'</div></div>';
  h+='<div class="detail-section"><h3>📋 基本信息</h3>';
  [['归经',v.meridian],['功效',v.effect],['主治',v.indications],['禁忌',v.contra],['建议食法',v.usage]].forEach(function(f){h+='<div class="info-row"><span class="label">'+f[0]+'</span><span class="value">'+esc(f[1])+'</span></div>'});
  h+='</div><div class="detail-section"><h3>📊 营养成分</h3><p>'+esc(v.nutrition)+'</p></div>';
  h+='<div class="detail-section"><h3>📖 详细介绍</h3><p>'+esc(v.desc)+'</p></div>';
  document.getElementById('dContent').innerHTML=h;
  document.getElementById('overlay').style.display='block';
  document.getElementById('panel').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeD(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').style.display='none';
  document.body.style.overflow='';
}
render();
</script>
</body>
</html>
